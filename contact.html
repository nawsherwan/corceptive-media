<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Corceptive Media</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Almarai:wght@400;700&display=swap" rel="stylesheet">

<body>

<header class="site-header">
  <div class="header-inner">

    <button class="menu-toggle" id="menuToggle">
      ☰
    </button>

    <nav class="main-nav" id="mainNav">

      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </div>

<main>

<section class="page-hero light-theme">
  <div class="container narrow-content">
    <h1>Contact</h1>
  </div>
</section>

<section class="content-section lightest-theme">
  <div class="container contact-grid">

    <div>
      <h2>Reach Out</h2>

      <p>

    <form class="contact-form">

  </div>

<footer class="site-footer darkest-theme">
